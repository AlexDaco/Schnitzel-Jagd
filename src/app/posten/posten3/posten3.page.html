<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-button slot="start" fill="clear" (click)="zurueck()">
      <ion-icon name="chevron-back"></ion-icon>
    </ion-button>
    <ion-title>{{ timerDisplay }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <h2>{{ title }}</h2>
  <p>{{ description }}</p>

  @if (!postenAbgeschlossen) {
  <ion-button expand="block" color="primary" (click)="qrScannen()">
    <ion-icon name="qr-code-outline" slot="start"></ion-icon>
    QR-Code scannen
  </ion-button>
  }

  @if (scanFehler) {
  <p style="color: red; margin-top: 1rem;">{{ scanFehler }}</p>
  }

  @if (postenAbgeschlossen) {
  <p style="color: green; margin-top: 1rem;">✓ QR-Code erfolgreich gescannt!</p>
  }
</ion-content>

<ion-footer class="ion-padding">
  @if (postenAbgeschlossen) {
  <ion-button expand="block" color="primary" (click)="weiter()">
    Weiter
  </ion-button>
  } @else {
  <ion-button expand="block" color="danger" (click)="postenUeberspringen()">
    Posten überspringen
  </ion-button>
  }
</ion-footer>
